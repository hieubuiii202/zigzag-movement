<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zig Zag Proxy Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e1e2e 0%, #2d2d44 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid #3498db;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }

        header h1 {
            color: #3498db;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        header p {
            color: #95a5a6;
            font-size: 14px;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .panel {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid #3498db;
            border-radius: 10px;
            padding: 20px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .panel:hover {
            background: rgba(0, 0, 0, 0.5);
            border-color: #2ecc71;
        }

        .panel h2 {
            color: #3498db;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 18px;
        }

        .panel h2 i {
            color: #2ecc71;
        }

        /* Control Panel */
        .control-group {
            margin-bottom: 20px;
        }

        .control-group label {
            display: block;
            margin-bottom: 8px;
            color: #2ecc71;
            font-weight: 600;
            font-size: 14px;
        }

        .control-group input[type="range"],
        .control-group input[type="number"],
        .control-group input[type="color"],
        .control-group select {
            width: 100%;
            padding: 10px;
            background: rgba(52, 152, 219, 0.1);
            border: 1px solid #3498db;
            border-radius: 5px;
            color: #e0e0e0;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .control-group input[type="range"]:hover,
        .control-group select:hover {
            border-color: #2ecc71;
            background: rgba(46, 204, 113, 0.1);
        }

        .value-display {
            display: inline-block;
            background: #2ecc71;
            color: #000;
            padding: 5px 10px;
            border-radius: 5px;
            margin-left: 10px;
            font-weight: bold;
            font-size: 12px;
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            padding: 12px;
            border: 1px solid;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 14px;
        }

        .btn-start {
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            border-color: #2ecc71;
            color: white;
        }

        .btn-start:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(46, 204, 113, 0.3);
        }

        .btn-stop {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            border-color: #e74c3c;
            color: white;
        }

        .btn-stop:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(231, 76, 60, 0.3);
        }

        .btn-reset {
            background: linear-gradient(135deg, #f39c12 0%, #d68910 100%);
            border-color: #f39c12;
            color: white;
            grid-column: 1 / -1;
        }

        .btn-reset:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(243, 156, 18, 0.3);
        }

        .btn-save {
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
            border-color: #3498db;
            color: white;
        }

        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        /* Canvas */
        .canvas-section {
            display: flex;
            flex-direction: column;
        }

        .canvas-container {
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid #3498db;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 20px;
            min-height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        svg {
            width: 100%;
            height: 100%;
        }

        /* Status & Info */
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .info-box {
            background: rgba(46, 204, 113, 0.1);
            border: 1px solid #2ecc71;
            border-radius: 5px;
            padding: 15px;
        }

        .info-box.warning {
            background: rgba(243, 156, 18, 0.1);
            border-color: #f39c12;
        }

        .info-box.danger {
            background: rgba(231, 76, 60, 0.1);
            border-color: #e74c3c;
        }

        .info-box h3 {
            color: #2ecc71;
            font-size: 12px;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .info-box.warning h3 {
            color: #f39c12;
        }

        .info-box.danger h3 {
            color: #e74c3c;
        }

        .info-value {
            font-size: 24px;
            font-weight: bold;
            color: #e0e0e0;
        }

        .info-unit {
            font-size: 12px;
            color: #95a5a6;
            margin-left: 5px;
        }

        /* Status Indicator */
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: rgba(46, 204, 113, 0.1);
            border-left: 3px solid #2ecc71;
            border-radius: 5px;
            margin-bottom: 15px;
        }

        .status-indicator.stopped {
            background: rgba(231, 76, 60, 0.1);
            border-left-color: #e74c3c;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #2ecc71;
            animation: pulse 2s infinite;
        }

        .status-dot.stopped {
            background: #e74c3c;
            animation: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Preset Buttons */
        .preset-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #3498db;
        }

        .preset-section h3 {
            color: #3498db;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .preset-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .preset-btn {
            padding: 10px;
            background: rgba(52, 152, 219, 0.2);
            border: 1px solid #3498db;
            border-radius: 5px;
            color: #3498db;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .preset-btn:hover {
            background: rgba(52, 152, 219, 0.4);
            transform: translateY(-2px);
        }

        .preset-btn.active {
            background: #3498db;
            color: white;
        }

        /* Code Panel */
        .code-panel {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #2ecc71;
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
        }

        .code-panel h3 {
            color: #2ecc71;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .code-display {
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #3498db;
            border-radius: 5px;
            padding: 15px;
            overflow-x: auto;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: #2ecc71;
            max-height: 300px;
        }

        .code-display code {
            word-break: break-all;
            white-space: pre-wrap;
        }

        .btn-copy {
            width: 100%;
            margin-top: 10px;
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            border-color: #2ecc71;
            color: white;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .main-grid {
                grid-template-columns: 1fr;
            }

            .preset-grid {
                grid-template-columns: 1fr 1fr 1fr 1fr;
            }
        }

        @media (max-width: 768px) {
            .button-group {
                grid-template-columns: 1fr;
            }

            .info-grid {
                grid-template-columns: 1fr;
            }

            .preset-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        /* Scroll Bar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
        }

        ::-webkit-scrollbar-thumb {
            background: #3498db;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #2ecc71;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <h1>
                <i class="fas fa-network-wired"></i>
                Zig Zag Proxy Panel
            </h1>
            <p>Điều khiển di chuyển zig zag với cấu hình proxy nâng cao</p>
        </header>

        <!-- Main Content -->
        <div class="main-grid">
            <!-- Left Panel: Controls -->
            <div class="panel">
                <h2>
                    <i class="fas fa-sliders-h"></i>
                    Bảng Điều Khiển
                </h2>

                <!-- Status Indicator -->
                <div class="status-indicator" id="statusIndicator">
                    <div class="status-dot"></div>
                    <span id="statusText">Đã dừng</span>
                </div>

                <!-- Amplitude Control -->
                <div class="control-group">
                    <label for="amplitude">
                        <i class="fas fa-arrows-alt-h"></i> Biên Độ (Amplitude)
                    </label>
                    <input type="range" id="amplitude" min="10" max="200" value="50">
                    <span class="value-display" id="amplitudeValue">50px</span>
                </div>

                <!-- Frequency Control -->
                <div class="control-group">
                    <label for="frequency">
                        <i class="fas fa-wave-square"></i> Tần Số (Frequency)
                    </label>
                    <input type="range" id="frequency" min="1" max="10" value="3">
                    <span class="value-display" id="frequencyValue">3</span>
                </div>

                <!-- Speed Control -->
                <div class="control-group">
                    <label for="speed">
                        <i class="fas fa-gauge-high"></i> Tốc Độ (Speed)
                    </label>
                    <input type="range" id="speed" min="0.5" max="5" step="0.5" value="2">
                    <span class="value-display" id="speedValue">2.0</span>
                </div>

                <!-- Direction Control -->
                <div class="control-group">
                    <label for="direction">
                        <i class="fas fa-compass"></i> Hướng Di Chuyển
                    </label>
                    <select id="direction">
                        <option value="horizontal">↔️ Ngang</option>
                        <option value="vertical">↕️ Dọc</option>
                        <option value="diagonal">↗️ Chéo</option>
                    </select>
                </div>

                <!-- Color Control -->
                <div class="control-group">
                    <label for="color">
                        <i class="fas fa-palette"></i> Màu Sắc
                    </label>
                    <input type="color" id="color" value="#3498db">
                </div>

                <!-- Action Buttons -->
                <div class="button-group">
                    <button class="btn btn-start" id="startBtn">
                        <i class="fas fa-play"></i> Bắt Đầu
                    </button>
                    <button class="btn btn-stop" id="stopBtn">
                        <i class="fas fa-stop"></i> Dừng
                    </button>
                    <button class="btn btn-reset" id="resetBtn">
                        <i class="fas fa-redo"></i> Đặt Lại
                    </button>
                </div>

                <!-- Presets -->
                <div class="preset-section">
                    <h3>⚡ Preset Nhanh</h3>
                    <div class="preset-grid">
                        <button class="preset-btn" data-preset="slow_large">Chậm Lớn</button>
                        <button class="preset-btn" data-preset="balanced">Cân Bằng</button>
                        <button class="preset-btn" data-preset="fast_small">Nhanh Nhỏ</button>
                        <button class="preset-btn" data-preset="vertical">Dọc</button>
                    </div>
                </div>
            </div>

            <!-- Right Panel: Canvas -->
            <div class="canvas-section">
                <div class="canvas-container">
                    <svg id="canvas" viewBox="0 0 800 400">
                        <defs>
                            <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
                                <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#3498db" stroke-width="0.5" opacity="0.3"/>
                            </pattern>
                            <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
                                <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
                            </linearGradient>
                        </defs>
                        
                        <!-- Background -->
                        <rect width="800" height="400" fill="url(#bgGradient)"/>
                        <rect width="800" height="400" fill="url(#grid)"/>
                        
                        <!-- Path visualization -->
                        <polyline id="pathLine" points="" fill="none" stroke="#2ecc71" stroke-width="2" stroke-dasharray="5,5" opacity="0.6"/>
                        
                        <!-- Start point -->
                        <circle id="startPoint" cx="50" cy="200" r="8" fill="#2ecc71" opacity="0.8"/>
                        
                        <!-- End point -->
                        <circle id="endPoint" cx="750" cy="200" r="8" fill="#e74c3c" opacity="0.8"/>
                        
                        <!-- Moving object -->
                        <g id="movingObject">
                            <circle cx="50" cy="200" r="12" fill="#3498db" filter="url(#glow)"/>
                            <circle cx="50" cy="200" r="6" fill="#ffffff" opacity="0.8"/>
                        </g>

                        <defs>
                            <filter id="glow">
                                <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
                                <feMerge>
                                    <feMergeNode in="coloredBlur"/>
                                    <feMergeNode in="SourceGraphic"/>
                                </feMerge>
                            </filter>
                        </defs>
                    </svg>
                </div>

                <!-- Info Grid -->
                <div class="info-grid">
                    <div class="info-box">
                        <h3>Vị Trí X</h3>
                        <div class="info-value">
                            <span id="posX">50</span>
                            <span class="info-unit">px</span>
                        </div>
                    </div>
                    <div class="info-box">
                        <h3>Vị Trí Y</h3>
                        <div class="info-value">
                            <span id="posY">200</span>
                            <span class="info-unit">px</span>
                        </div>
                    </div>
                    <div class="info-box warning">
                        <h3>Tiến Độ</h3>
                        <div class="info-value">
                            <span id="progress">0</span>
                            <span class="info-unit">%</span>
                        </div>
                    </div>
                    <div class="info-box danger">
                        <h3>Thời Gian Còn Lại</h3>
                        <div class="info-value">
                            <span id="timeLeft">0.0</span>
                            <span class="info-unit">s</span>
                        </div>
                    </div>
                </div>

                <!-- Code Panel -->
                <div class="code-panel">
                    <h3>📋 Cấu Hình JSON</h3>
                    <div class="code-display">
                        <code id="configCode">{}</code>
                    </div>
                    <button class="btn btn-copy" id="copyBtn">
                        <i class="fas fa-copy"></i> Sao Chép Code
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="zigzag-engine.js"></script>
</body>
</html>
